name: Deploy Smoke Test

# Headless-browser smoke test against the *deployed* Vercel URL. A green
# `next build` only proves the app compiles; this proves it actually renders in
# a real browser on Vercel — no crashed chunks, no mis-served wasm (the
# confidential-transfer `.wasm` served as text/plain that broke
# WebAssembly.instantiateStreaming — HOO-628 / PR #84), no client-side
# exceptions.
#
# Triggered by `deployment_status` (fires when Vercel finishes a deploy and
# hands us the live `environment_url`). This trigger runs in the *base* repo
# context, so repo secrets are available even for pull requests opened from
# forks — unlike a plain `pull_request` trigger, which GitHub runs with no
# secrets for fork PRs (that is why an earlier `pull_request` version could only
# ever skip: `VERCEL_AUTOMATION_BYPASS_SECRET` was never visible to it).
#
# Org-owned Vercel projects gate preview URLs behind an SSO login. The
# `VERCEL_AUTOMATION_BYPASS_SECRET` repo secret (Vercel dashboard → Project →
# Settings → Deployment Protection → "Protection Bypass for Automation") lets
# the test through. Without it, a protected deployment is detected and the smoke
# test is skipped (green) instead of run, so this check is safe to keep enabled.
#
# NOTE: `deployment_status` (like all non-`pull_request` events) runs the
# workflow file from the default branch, so changes here only take effect once
# merged to `main`. `workflow_dispatch` is kept for manual runs against a URL.
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: 'Deployment URL to smoke test'
        required: true

permissions:
  contents: read
  statuses: write

jobs:
  smoke-test:
    # Manual dispatch always runs; deployment_status runs only for a successful
    # Preview deploy that actually exposes a URL. `deployment_status` fires for
    # every environment, so without the environment check the test would also
    # run on Production deploys. Matched with `startsWith` because Vercel names
    # the environment `Preview – <project>` for monorepo projects.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment_url != '' &&
       startsWith(github.event.deployment_status.environment, 'Preview'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deployment URL
        id: url
        env:
          INPUT_URL: ${{ inputs.url }}
          DEPLOY_URL: ${{ github.event.deployment_status.environment_url }}
        run: |
          set -euo pipefail
          url="${INPUT_URL:-$DEPLOY_URL}"
          if [ -z "$url" ]; then
            echo "::error::No deployment URL available."
            exit 1
          fi
          echo "Smoke-testing: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Detect Vercel protection gate
        id: gate
        env:
          URL: ${{ steps.url.outputs.url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          # With a bypass secret the test can get past the SSO gate, so always run.
          if [ -n "${BYPASS:-}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # No secret: cheaply detect the protection gate up front and skip
          # before the expensive Playwright install rather than have the test
          # start up only to skip. Vercel's gate answers with a 401, or a 3xx
          # redirect to its SSO login (vercel.com/sso-api).
          out=$(curl -s -o /dev/null -w '%{http_code} %{redirect_url}' "${URL%/}/" || echo "000 ")
          code=${out%% *}
          loc=${out#* }
          if [ "$code" = "401" ] || printf '%s' "$loc" | grep -q 'vercel.com/sso'; then
            echo "::notice::Preview is behind Vercel protection and VERCEL_AUTOMATION_BYPASS_SECRET is not set; skipping smoke test."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.gate.outputs.run == 'true'
        run: pnpm --filter @mosaic/app exec playwright install --with-deps chromium

      - name: Run smoke test
        if: steps.gate.outputs.run == 'true'
        env:
          SMOKE_URL: ${{ steps.url.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm --filter @mosaic/app exec node scripts/smoke-test.mjs
